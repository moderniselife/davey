name: "[davey] Release to crates.io"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests for davey crate
        run: cargo test -p davey

  get_version:
    name: Get crate version
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      version: ${{ steps.get_version.outputs.current_version }}
    defaults:
      run:
        working-directory: davey
    steps:
      - uses: actions/checkout@v5
      - name: Read crate version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '^version\s*=\s*"' Cargo.toml | head -n1 | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          echo "current_version=$VERSION" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: [get_version]
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: davey
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Authenticate with crates.io via Trusted Publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth
      - name: Publish davey to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: cargo publish

  release:
    name: Create release
    needs: [get_version, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --unreleased --strip all --ignore-tags="(js|py)-*" --include-path="./davey/**"
        env:
          OUTPUT: davey/CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "rs-${{ needs.get_version.outputs.version }}"
          name: "davey@${{ needs.get_version.outputs.version }}"
          target_commitish: ${{ github.sha }}
          body_path: davey/CHANGELOG.md
